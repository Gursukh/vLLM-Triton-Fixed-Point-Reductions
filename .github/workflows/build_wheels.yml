name: Build wheels

# Builds platform-specific binary wheels so users can install fxpr_vllm
# without invoking nvcc on their own machine. Triggers:
#   * push of a tag matching v*           -> build + attach to GitHub release
#   * manual dispatch                     -> build, leave as workflow artifacts
#
# Each row of the matrix produces one wheel for a (python, torch, cuda)
# combination. The fat binary covers sm_75..sm_90; users on any of those
# archs can pick the matching wheel.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: write   # needed to upload assets to a release

jobs:
  build_wheels:
    name: py${{ matrix.python }} torch${{ matrix.torch }} cu${{ matrix.cuda_short }}
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          # Colab default: Python 3.12, torch 2.5+, CUDA 12.4.
          - python: '3.12'
            torch: '2.5.1'
            cuda: '12.4.1'
            cuda_short: '124'
          - python: '3.12'
            torch: '2.6.0'
            cuda: '12.4.1'
            cuda_short: '124'
          - python: '3.12'
            torch: '2.7.0'
            cuda: '12.6.3'
            cuda_short: '126'
          # Older Python for users on stable distros.
          - python: '3.11'
            torch: '2.5.1'
            cuda: '12.4.1'
            cuda_short: '124'
          - python: '3.10'
            torch: '2.5.1'
            cuda: '12.4.1'
            cuda_short: '124'

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        # Default ubuntu-22.04 runners come close to full after CUDA.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL || true
          df -h

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install CUDA toolkit ${{ matrix.cuda }}
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: ${{ matrix.cuda }}
          method: network
          # The full toolkit is ~3 GB; we only need nvcc + the core libs.
          sub-packages: '["nvcc","cudart","cuobjdump","nvprune"]'

      - name: Install torch ${{ matrix.torch }} (CUDA ${{ matrix.cuda_short }})
        run: |
          python -m pip install --upgrade pip setuptools wheel build
          python -m pip install \
            torch==${{ matrix.torch }} \
            --index-url https://download.pytorch.org/whl/cu${{ matrix.cuda_short }}

      - name: Build wheel
        env:
          # Fat binary for every supported arch.
          TORCH_CUDA_ARCH_LIST: '7.5;8.0;8.6;8.9;9.0'
          # Use ~half the runner cores to stay under memory caps.
          MAX_JOBS: '2'
        run: |
          python -m build --wheel --no-isolation

      - name: Rename wheel with torch/cuda tags
        # Bake the torch + cuda compatibility into the filename so users
        # can pick the right one without ambiguity.
        run: |
          cd dist
          for whl in *.whl; do
            base="${whl%.whl}"
            new="${base}+torch${{ matrix.torch }}cu${{ matrix.cuda_short }}.whl"
            mv "$whl" "$new"
            echo "Renamed -> $new"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-py${{ matrix.python }}-torch${{ matrix.torch }}-cu${{ matrix.cuda_short }}
          path: dist/*.whl

      - name: Attach wheel to release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          # Don't fail the job if the release is created concurrently.
          fail_on_unmatched_files: false
